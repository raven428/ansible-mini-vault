# kics-scan disable=555ab8f9-2001-455e-a077-f2d0f41e2fb9
---
name: test role
on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    - cron: "11 11 * * 1"
  # checkov:skip=CKV_GHA_7
  workflow_dispatch:
    inputs:
      mega_var_ref:
        description: "ansible-mega-var branch/tag to test against"
        required: false
        default: ""
      mega_launch_ref:
        description: "ansible-launch-var branch/tag to test against"
        required: false
        default: ""
      mega_service_ref:
        description: "ansible-service-var branch/tag to test against"
        required: false
        default: ""
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
jobs:
  default:
    name: t
    timeout-minutes: 33
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        call_mode:
          - def1
          - def2
        ansible_ver:
          - "06"
          - "07"
          - "08"
          - "09"
          - "10"
          - "11"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: true
      - name: test role
        env:
          ANSIBLE_CALL_MODE: ${{ matrix.call_mode }}
          APPIMAGE_NAME: "ansible-${{ matrix.ansible_ver }}-001.AppImage"
          MEGA_VAR_REF: ${{ inputs.mega_var_ref }}
          MEGA_LAUNCH_REF: ${{ inputs.mega_launch_ref }}
          MEGA_SERVICE_REF: ${{ inputs.mega_service_ref }}
        run: molecule/default/run-tests.sh
  linters:
    name: linters
    timeout-minutes: 11
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: true
      - name: lint the repo
        env:
          BRA: master
        run: |
          curl -sL \
          https://raw.githubusercontent.com/raven428/container-images/refs/heads/${{
          env.BRA }}/sources/linters-ubuntu-22_04/check-dir.sh | bash
          curl -sL \
          https://raw.githubusercontent.com/raven428/container-images/refs/heads/${{
          env.BRA }}/sources/ansible-ubuntu/check-dir.sh | bash
          tests/run-tests.sh
  MegaLinter:
    name: MegaLinter
    timeout-minutes: 11
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: true
      - name: MegaLinter
        uses: oxsecurity/megalinter@v9
        env:
          VALIDATE_ALL_CODEBASE: true
  all-green:
    name: all green
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs:
      - default
      - linters
      - MegaLinter
    if: github.event_name == 'pull_request'
    permissions:
      checks: read
    steps:
      - name: waiting for checks success
        uses: poseidon/wait-for-status-checks@v0.6.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore: all green, foobar
          timeout: 111s
