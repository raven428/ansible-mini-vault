---
ansible_managed: "Generated by Ansible"
v:
  over:
    # Override default boolean value
    ui: "false"

    # Override default block (listener1) - level 1
    listener1:
      name: "listener"
      value: "tcp"
      params:
        tls_disable: "0"
        address: "10.0.0.1:8200"
        # Nested simple params - level 2
        tls_min_version: "tls1.2"
        tls_cipher_suites: "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"

    # Add second block - demonstrates multiple blocks with same name
    listener2:
      name: "listener"
      value: "tcp"
      params:
        address: "10.0.0.2:8200"
        tls_disable: "1"

    # Override default storage block
    storage:
      value: "raft"
      params:
        path: "/data/vault"
        node_id: "node1"
        # Numeric value without quotes
        retry_join_max: "3"

    # Simple string value
    api_addr: "https://vault.example.com"

    # Simple numeric value
    cluster_port: "8201"

    # New block not in defaults
    telemetry:
      value: "statsd"
      params:
        address: "127.0.0.1:8125"
